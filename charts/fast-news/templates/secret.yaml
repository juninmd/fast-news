apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    {{- include "fast-news.labels" . | nindent 4 }}
type: Opaque
stringData:
  TELEGRAM_BOT_TOKEN: {{ .Values.secrets.telegramBotToken | quote }}
  TELEGRAM_CHAT_IDS: {{ .Values.secrets.telegramChatIds | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s-postgres:5432/%s" .Values.postgres.username .Values.secrets.postgresPassword .Release.Name .Values.postgres.database | quote }}
  REDIS_URL: {{ printf "redis://%s-redis:6379" .Release.Name | quote }}
  OLLAMA_BASE_URL: {{ printf "http://%s-ollama:%d/v1" .Release.Name (.Values.ollama.port | int) | quote }}
